<!doctype html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NexoTasks | Pro</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&display=swap');
    body { font-family: 'Crimson Pro', serif; background-color: #fdf6e3; color: #3f3b39; overflow: hidden; }
    .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border: 2px solid #3f3b39; }
    .side-icon.active { @apply border-[#3f3b39] bg-[#88c0d0] text-white; }
    .nav-bottom.active { @apply opacity-100 scale-110 text-blue-600; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    .urgent-shake { animation: shake 0.5s infinite; color: #ef4444; }
  </style>
</head>
<body class="h-full flex flex-col">

  <header class="h-14 border-b-2 border-[#3f3b39] flex items-center justify-between px-6 bg-white shrink-0">
    <div class="flex items-center gap-2 font-bold">0🌕</div>
    <h1 class="font-bold text-lg">NexoTasks</h1>
    <button onclick="toggleProfile()" class="p-2 border-2 border-[#3f3b39] rounded-full bg-white shadow-[2px_2px_0_0_#3f3b39]">
        <i data-lucide="user" class="w-4 h-4"></i>
    </button>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <aside class="w-16 border-r-2 border-[#3f3b39] flex flex-col items-center py-4 gap-4 bg-white shrink-0">
      <button onclick="setCategory('salud')" id="cat-salud" class="p-3 rounded-xl border-2 border-transparent"><i data-lucide="pill"></i></button>
      <button onclick="setCategory('colegio')" id="cat-colegio" class="p-3 rounded-xl border-2 border-transparent"><i data-lucide="book-open"></i></button>
      <button onclick="setCategory('hogar')" id="cat-hogar" class="p-3 rounded-xl border-2 border-transparent"><i data-lucide="home"></i></button>
      <button onclick="setCategory('otros')" id="cat-otros" class="p-3 rounded-xl border-2 border-transparent"><i data-lucide="star"></i></button>
      <button onclick="openWorldMenu()" class="p-3 rounded-xl bg-[#3f3b39] text-white"><i data-lucide="languages"></i></button>
    </aside>

    <main class="flex-1 flex flex-col relative">
      <div id="tasks-scroll" class="flex-1 overflow-y-auto p-4 space-y-3 pb-32"></div>

      <div id="input-area" class="absolute bottom-24 left-4 right-4 glass p-4 rounded-2xl">
        <input type="text" id="task-input" placeholder="Nueva tarea..." class="w-full bg-transparent border-b border-[#3f3b39] py-1 outline-none font-bold mb-2">
        <div class="flex justify-between items-center">
            <input type="datetime-local" id="task-deadline" class="text-[10px] border border-[#3f3b39] p-1">
            <button onclick="addTask()" class="bg-[#3f3b39] text-white px-3 py-1 rounded font-bold text-[10px]">REGISTRAR</button>
        </div>
      </div>

      <nav class="h-20 border-t-2 border-[#3f3b39] bg-white flex justify-around items-center px-2">
        <button onclick="setTab('pendientes')" id="tab-pendientes" class="nav-bottom active opacity-50 flex flex-col items-center"><i data-lucide="clock"></i><span class="text-[9px] font-bold">PENDIENTES</span></button>
        <button onclick="setTab('finalizadas')" id="tab-finalizadas" class="nav-bottom opacity-50 flex flex-col items-center"><i data-lucide="check-circle-2"></i><span class="text-[9px] font-bold">FINALIZADAS</span></button>
        <button onclick="setTab('atrasadas')" id="tab-atrasadas" class="nav-bottom opacity-50 flex flex-col items-center"><span class="text-xl">🐰💢</span><span class="text-[9px] font-bold">ATRASADAS</span></button>
      </nav>
    </main>
  </div>

  <div id="profile-modal" class="fixed inset-0 bg-black/50 z-[200] hidden flex items-center justify-center p-6">
    <div class="glass w-full max-w-sm rounded-[30px] p-6 space-y-6 bg-white">
        <div class="flex justify-between items-center">
            <h2 class="text-xl font-bold">Notificaciones</h2>
            <button onclick="toggleProfile()"><i data-lucide="x"></i></button>
        </div>
        
        <div class="space-y-4">
            <div class="p-4 border-2 border-[#3f3b39] rounded-2xl bg-[#fdf6e3]">
                <p class="text-xs font-bold mb-2">SONIDO DE RECORDATORIO (Semana Crítica)</p>
                <input type="file" id="sound-upload" accept="audio/*" class="hidden">
                <button onclick="document.getElementById('sound-upload').click()" class="w-full py-2 bg-white border-2 border-[#3f3b39] rounded-lg text-xs font-bold flex items-center justify-center gap-2">
                    <i data-lucide="upload-cloud"></i> IMPORTAR SONIDO
                </button>
                <button onclick="testSound()" class="w-full mt-2 py-1 text-[10px] underline">Probar sonido actual</button>
            </div>
            <p class="text-[9px] opacity-70">Las alertas sonarán 5 veces durante la última semana antes del vencimiento.</p>
        </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDPTKgbttL8DbukqHhB8vE-5hEVE6A2v8M",
      authDomain: "nexotasks.firebaseapp.com",
      databaseURL: "https://nexotasks-default-rtdb.firebaseio.com",
      projectId: "nexotasks",
      storageBucket: "nexotasks.firebasestorage.app",
      messagingSenderId: "821277921208",
      appId: "1:821277921208:web:abbc7d0d2855eca671894d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentTab = 'pendientes';
    let currentCategory = 'hogar';
    let customSoundBase64 = localStorage.getItem('custom_sound') || '';
    const alertAudio = new Audio();

    window.onload = () => { lucide.createIcons(); setCategory('hogar'); checkDeadlinesLoop(); };

    // --- SISTEMA DE SONIDO ---
    document.getElementById('sound-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            customSoundBase64 = event.target.result;
            localStorage.setItem('custom_sound', customSoundBase64);
            alert("Sonido importado con éxito.");
        };
        reader.readAsDataURL(file);
    });

    window.testSound = () => {
        if(!customSoundBase64) return alert("Sube un sonido primero.");
        alertAudio.src = customSoundBase64;
        alertAudio.play();
    };

    window.toggleProfile = () => document.getElementById('profile-modal').classList.toggle('hidden');

    // --- LÓGICA DE ALERTAS (7 DÍAS) ---
    function checkDeadlinesLoop() {
        setInterval(() => {
            const now = Date.now();
            onValue(ref(db, `local_tasks/${currentCategory}`), (snap) => {
                const tasks = snap.val();
                if(!tasks) return;
                Object.values(tasks).forEach(task => {
                    const timeLeft = task.deadline - now;
                    const sevenDaysInMs = 7 * 24 * 60 * 60 * 1000;

                    // Si faltan menos de 7 días y está pendiente
                    if(timeLeft > 0 && timeLeft <= sevenDaysInMs && task.status === 'pendientes') {
                        // Lógica para sonar 5 veces (cada 1.4 días aprox)
                        const lastAlert = task.lastAlert || 0;
                        if(now - lastAlert > (sevenDaysInMs / 5)) {
                            playAlert(task.text);
                            // Aquí se podría actualizar 'lastAlert' en DB para no repetir
                        }
                    }
                });
            }, {onlyOnce: true});
        }, 60000); // Revisa cada minuto
    }

    function playAlert(taskName) {
        if(customSoundBase64) {
            alertAudio.src = customSoundBase64;
            alertAudio.play();
        }
        console.log("ALERTA CRÍTICA: " + taskName);
    }

    // --- TAREAS ---
    window.addTask = () => {
        const text = document.getElementById('task-input').value;
        const deadlineStr = document.getElementById('task-deadline').value;
        if(!text || !deadlineStr) return;

        push(ref(db, `local_tasks/${currentCategory}`), {
            text,
            deadline: new Date(deadlineStr).getTime(),
            status: 'pendientes',
            category: currentCategory
        });
        document.getElementById('task-input').value = '';
    };

    function loadTasks() {
        onValue(ref(db, `local_tasks/${currentCategory}`), (snap) => {
            const data = snap.val();
            const container = document.getElementById('tasks-scroll');
            container.innerHTML = '';
            if(!data) return;

            Object.keys(data).forEach(id => {
                const task = data[id];
                const now = Date.now();
                const timeLeft = task.deadline - now;
                let status = task.status;

                if(status === 'pendientes' && now > task.deadline) status = 'atrasadas';
                if(status !== currentTab) return;

                const isUrgent = timeLeft > 0 && timeLeft < (7 * 24 * 60 * 60 * 1000);

                const div = document.createElement('div');
                div.className = "glass p-4 rounded-xl bg-white flex justify-between items-center";
                div.innerHTML = `
                    <div class="${isUrgent && status === 'pendientes' ? 'urgent-shake' : ''}">
                        <div class="font-bold text-sm">${task.text}</div>
                        <div class="text-[8px] opacity-60">Límite: ${new Date(task.deadline).toLocaleString()}</div>
                    </div>
                    ${status === 'pendientes' ? `<button onclick="completeTask('${id}')" class="w-8 h-8 border-2 border-[#3f3b39] rounded bg-green-200"><i data-lucide="check" class="w-4 h-4 mx-auto"></i></button>` : ''}
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
        });
    }

    window.completeTask = (id) => update(ref(db, `local_tasks/${currentCategory}/${id}`), { status: 'finalizadas' });
    window.setCategory = (cat) => { currentCategory = cat; loadTasks(); };
    window.setTab = (tab) => { currentTab = tab; loadTasks(); };

  </script>
</body>
</html>
