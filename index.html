<!doctype html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NexoTasks | Servidores</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&display=swap');
    body { font-family: 'Crimson Pro', serif; background-color: #fdf6e3; color: #3f3b39; overflow: hidden; }
    .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border: 2px solid #3f3b39; }
    .side-icon.active { @apply border-[#3f3b39] bg-[#88c0d0] text-white; }
    .nav-bottom.active { @apply opacity-100 scale-110 text-blue-600; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    .urgent-shake { animation: shake 0.5s infinite; color: #ef4444; }
  </style>
</head>
<body class="h-full flex flex-col">

  <header class="h-14 border-b-2 border-[#3f3b39] flex items-center justify-between px-6 bg-white shrink-0">
    <div class="flex items-center gap-2 font-bold">0🌕</div>
    <h1 class="font-bold text-lg">NexoTasks</h1>
    <button onclick="toggleProfile()" class="p-2 border-2 border-[#3f3b39] rounded-full"><i data-lucide="user"></i></button>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <aside class="w-16 border-r-2 border-[#3f3b39] flex flex-col items-center py-4 gap-4 bg-white shrink-0">
      <button onclick="setCategory('salud')" id="cat-salud" class="p-3 rounded-xl border-2 border-transparent"><i data-lucide="pill"></i></button>
      <button onclick="setCategory('colegio')" id="cat-colegio" class="p-3 rounded-xl border-2 border-transparent"><i data-lucide="book-open"></i></button>
      <button onclick="setCategory('hogar')" id="cat-hogar" class="p-3 rounded-xl border-2 border-transparent"><i data-lucide="home"></i></button>
      <button onclick="setCategory('otros')" id="cat-otros" class="p-3 rounded-xl border-2 border-transparent"><i data-lucide="star"></i></button>
      <div class="w-8 h-[2px] bg-[#3f3b39] opacity-20"></div>
      <button onclick="openWorldMenu()" id="cat-server" class="p-3 rounded-xl border-2 border-transparent text-[#3f3b39]"><i data-lucide="globe-2"></i></button>
    </aside>

    <main class="flex-1 flex flex-col relative">
      <div id="tasks-scroll" class="flex-1 overflow-y-auto p-4 space-y-3 pb-32"></div>

      <div id="input-area" class="absolute bottom-24 left-4 right-4 glass p-4 rounded-2xl">
        <input type="text" id="task-input" placeholder="Nueva tarea..." class="w-full bg-transparent border-b border-[#3f3b39] py-1 outline-none font-bold mb-2">
        <div class="flex justify-between items-center">
            <input type="datetime-local" id="task-deadline" class="text-[10px] border border-[#3f3b39] p-1">
            <button onclick="addTask()" class="bg-[#3f3b39] text-white px-3 py-1 rounded font-bold text-[10px]">REGISTRAR</button>
        </div>
      </div>

      <nav class="h-20 border-t-2 border-[#3f3b39] bg-white flex justify-around items-center px-2">
        <button onclick="setTab('pendientes')" id="tab-pendientes" class="nav-bottom active opacity-50 flex flex-col items-center"><i data-lucide="clock"></i><span class="text-[9px] font-bold">PENDIENTES</span></button>
        <button onclick="setTab('finalizadas')" id="tab-finalizadas" class="nav-bottom opacity-50 flex flex-col items-center"><i data-lucide="check-circle-2"></i><span class="text-[9px] font-bold">FINALIZADAS</span></button>
        <button onclick="setTab('atrasadas')" id="tab-atrasadas" class="nav-bottom opacity-50 flex flex-col items-center"><span class="text-xl">🐰💢</span><span class="text-[9px] font-bold">ATRASADAS</span></button>
      </nav>
    </main>
  </div>

  <div id="world-modal" class="fixed inset-0 bg-black/60 z-[200] hidden flex items-center justify-center p-6">
    <div class="glass w-full max-w-sm rounded-[30px] p-6 space-y-6 bg-white">
        <div class="flex justify-between items-center">
            <h2 class="text-xl font-bold">Servidor Shared</h2>
            <button onclick="closeWorldMenu()"><i data-lucide="x"></i></button>
        </div>
        <button onclick="createWorld()" class="w-full p-4 border-2 border-[#3f3b39] rounded-2xl flex items-center gap-4 hover:bg-gray-50">
            <span class="text-3xl">🐰</span>
            <div class="text-left"><b class="block">Crear Servidor</b><small class="text-gray-500">Genera un código nuevo</small></div>
        </button>
        <div class="p-4 border-2 border-[#3f3b39] rounded-2xl space-y-3">
            <div class="flex items-center gap-4"><span class="text-3xl">🌏</span><b>Unirse a uno</b></div>
            <input type="text" id="join-input" placeholder="CÓDIGO" class="w-full border-b-2 border-[#3f3b39] text-center font-bold outline-none uppercase tracking-widest">
            <button onclick="joinWorld()" class="w-full bg-[#3f3b39] text-white py-2 rounded-xl font-bold text-xs">CONECTAR</button>
        </div>
        <div id="active-world-tag" class="text-center text-[10px] font-bold text-blue-500 uppercase">MODO LOCAL</div>
        <button onclick="exitWorld()" id="exit-btn" class="hidden w-full text-red-500 text-[10px] font-bold underline">Salir del servidor</button>
    </div>
  </div>

  <div id="profile-modal" class="fixed inset-0 bg-black/50 z-[200] hidden flex items-center justify-center p-6">
    <div class="glass w-full max-w-sm rounded-[30px] p-6 space-y-6 bg-white">
        <div class="flex justify-between items-center"><h2 class="text-xl font-bold">Ajustes</h2><button onclick="toggleProfile()"><i data-lucide="x"></i></button></div>
        <div class="p-4 border-2 border-[#3f3b39] rounded-2xl bg-[#fdf6e3]">
            <p class="text-xs font-bold mb-2 uppercase">Sonido Recordatorio</p>
            <input type="file" id="sound-upload" accept="audio/*" class="hidden">
            <button onclick="document.getElementById('sound-upload').click()" class="w-full py-2 bg-white border-2 border-[#3f3b39] rounded-lg text-xs font-bold">IMPORTAR AUDIO</button>
            <button onclick="testSound()" class="w-full mt-2 text-[10px] underline">Probar actual</button>
        </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDPTKgbttL8DbukqHhB8vE-5hEVE6A2v8M",
      authDomain: "nexotasks.firebaseapp.com",
      databaseURL: "https://nexotasks-default-rtdb.firebaseio.com",
      projectId: "nexotasks",
      storageBucket: "nexotasks.firebasestorage.app",
      messagingSenderId: "821277921208",
      appId: "1:821277921208:web:abbc7d0d2855eca671894d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentTab = 'pendientes';
    let currentCategory = 'hogar';
    let activeWorld = localStorage.getItem('nx_active_world') || '';
    let customSound = localStorage.getItem('custom_sound') || '';
    const audioPlayer = new Audio();

    window.onload = () => { lucide.createIcons(); setCategory('hogar'); if(activeWorld) syncWorld(); };

    // --- LÓGICA DE SERVIDORES ---
    window.openWorldMenu = () => document.getElementById('world-modal').classList.remove('hidden');
    window.closeWorldMenu = () => document.getElementById('world-modal').classList.add('hidden');

    window.createWorld = () => {
        const code = Math.random().toString(36).substring(2, 7).toUpperCase();
        activeWorld = code;
        localStorage.setItem('nx_active_world', code);
        set(ref(db, `worlds/${code}`), { created: Date.now() });
        syncWorld();
        closeWorldMenu();
    };

    window.joinWorld = () => {
        const code = document.getElementById('join-input').value.toUpperCase();
        onValue(ref(db, `worlds/${code}`), (snap) => {
            if(snap.exists()) {
                activeWorld = code;
                localStorage.setItem('nx_active_world', code);
                syncWorld();
                closeWorldMenu();
            } else { alert("Servidor no encontrado"); }
        }, {onlyOnce: true});
    };

    window.exitWorld = () => {
        activeWorld = '';
        localStorage.removeItem('nx_active_world');
        location.reload();
    };

    function syncWorld() {
        document.getElementById('active-world-tag').innerText = "CONECTADO A: " + activeWorld;
        document.getElementById('cat-server').classList.add('active');
        document.getElementById('exit-btn').classList.remove('hidden');
        loadTasks();
    }

    // --- TAREAS Y CATEGORÍAS ---
    window.setCategory = (cat) => {
        currentCategory = cat;
        document.querySelectorAll('.side-icon').forEach(el => el.classList.remove('active'));
        document.getElementById(`cat-${cat}`)?.classList.add('active');
        loadTasks();
    };

    window.setTab = (tab) => {
        currentTab = tab;
        document.querySelectorAll('.nav-bottom').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        document.getElementById('input-area').style.display = (tab === 'pendientes') ? 'block' : 'none';
        loadTasks();
    };

    window.addTask = () => {
        const text = document.getElementById('task-input').value;
        const date = document.getElementById('task-deadline').value;
        if(!text || !date) return;
        const path = activeWorld ? `worlds/${activeWorld}/tasks` : `local_tasks/${currentCategory}`;
        push(ref(db, path), { text, deadline: new Date(date).getTime(), status: 'pendientes', category: currentCategory });
        document.getElementById('task-input').value = '';
    };

    function loadTasks() {
        const path = activeWorld ? `worlds/${activeWorld}/tasks` : `local_tasks/${currentCategory}`;
        onValue(ref(db, path), (snap) => {
            const container = document.getElementById('tasks-scroll');
            container.innerHTML = '';
            const data = snap.val();
            if(!data) return;
            Object.keys(data).forEach(id => {
                const task = data[id];
                const now = Date.now();
                let status = task.status;
                if(status === 'pendientes' && now > task.deadline) status = 'atrasadas';
                if(status !== currentTab) return;
                if(!activeWorld && task.category !== currentCategory) return;

                const div = document.createElement('div');
                div.className = "glass p-4 rounded-xl bg-white flex justify-between items-center";
                div.innerHTML = `
                    <div>
                        <div class="font-bold text-sm">${task.text}</div>
                        <div class="text-[8px] opacity-60">${new Date(task.deadline).toLocaleString()}</div>
                    </div>
                    ${status === 'pendientes' ? `<button onclick="completeTask('${id}', '${path}')" class="p-2 border-2 border-[#3f3b39] rounded bg-green-100"><i data-lucide="check"></i></button>` : ''}
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
        });
    }

    window.completeTask = (id, path) => update(ref(db, `${path}/${id}`), { status: 'finalizadas' });
    window.toggleProfile = () => document.getElementById('profile-modal').classList.toggle('hidden');

    // --- SONIDO ---
    document.getElementById('sound-upload').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => { customSound = ev.target.result; localStorage.setItem('custom_sound', customSound); };
        reader.readAsDataURL(e.target.files[0]);
    });
    window.testSound = () => { if(customSound) { audioPlayer.src = customSound; audioPlayer.play(); } };

  </script>
</body>
</html>
