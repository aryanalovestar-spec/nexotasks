<!doctype html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NexoTasks | Pro</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&display=swap');
    body { font-family: 'Crimson Pro', serif; transition: background 0.5s; overflow: hidden; background-size: cover; background-position: center; background-color: #fdf6e3; height: 100vh; display: flex; flex-direction: column; }
    .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 2px solid #3f3b39; border-radius: 24px; }
    .side-icon.active { background: #88c0d0; color: white; border-color: #3f3b39; transform: scale(1.1); }
    @keyframes walk {
      0% { transform: translateX(-100px) scaleX(1); }
      49% { transform: translateX(calc(100vw + 100px)) scaleX(1); }
      50% { transform: translateX(calc(100vw + 100px)) scaleX(-1); }
      99% { transform: translateX(-100px) scaleX(-1); }
      100% { transform: translateX(-100px) scaleX(1); }
    }
    #active-pet { position: fixed; bottom: 130px; left: 0; font-size: 3.5rem; animation: walk 25s linear infinite; z-index: 40; pointer-events: none; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); }
  </style>
</head>
<body id="app-body">

  <header class="h-16 border-b-2 border-[#3f3b39] flex items-center justify-between px-6 bg-white/90 shrink-0 z-50">
    <div class="flex items-center gap-2 font-bold bg-yellow-100 px-3 py-1 rounded-full border-2 border-yellow-500 shadow-sm">
        <span id="luna-counter">0</span> 🌕
    </div>
    <div class="flex gap-3">
        <button onclick="openStore()" class="text-2xl active:scale-90 transition">🐾</button>
        <button onclick="openProfile()" class="p-2 border-2 border-[#3f3b39] rounded-full bg-white shadow-sm"><i data-lucide="user"></i></button>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <aside class="w-16 border-r-2 border-[#3f3b39] flex flex-col items-center py-6 gap-5 bg-white/90 shrink-0 overflow-y-auto">
      <button onclick="setCat('salud')" id="c-salud" class="side-icon p-3 border-2 border-transparent rounded-xl transition-all"><i data-lucide="pill"></i></button>
      <button onclick="setCat('colegio')" id="c-colegio" class="side-icon p-3 border-2 border-transparent rounded-xl transition-all"><i data-lucide="book-open"></i></button>
      <button onclick="setCat('hogar')" id="c-hogar" class="side-icon p-3 border-2 border-transparent rounded-xl transition-all"><i data-lucide="home"></i></button>
      <button onclick="setCat('otros')" id="c-otros" class="side-icon p-3 border-2 border-transparent rounded-xl transition-all"><i data-lucide="star"></i></button>
      <div class="w-8 h-[2px] bg-[#3f3b39] opacity-20 my-1"></div>
      <button onclick="setCat('servidor')" id="c-servidor" class="side-icon p-3 border-2 border-transparent rounded-xl text-blue-600 transition-all"><i data-lucide="server"></i></button>
    </aside>

    <main class="flex-1 relative flex flex-col">
      <div id="task-list" class="flex-1 overflow-y-auto p-4 space-y-4 pb-56"></div>
      
      <div id="active-pet" class="hidden"></div>

      <div class="absolute bottom-6 left-4 right-4 glass p-5 shadow-2xl z-50">
        <input type="text" id="t-text" placeholder="Nueva tarea..." class="w-full bg-transparent border-b-2 border-[#3f3b39] mb-3 outline-none font-bold text-lg placeholder:text-gray-400">
        <div class="grid grid-cols-2 gap-3 mb-4">
            <select id="t-cat" class="bg-white border-2 border-[#3f3b39] rounded-lg p-2 text-xs font-bold outline-none">
                <option value="salud">Salud</option>
                <option value="colegio">Colegio</option>
                <option value="hogar">Hogar</option>
                <option value="otros">Otros</option>
                <option value="servidor">Servidor</option>
            </select>
            <input type="datetime-local" id="t-date" class="border-2 border-[#3f3b39] rounded-lg p-2 text-[10px] font-bold bg-white outline-none">
        </div>
        <button onclick="saveTask()" class="w-full bg-[#3f3b39] text-white py-3 rounded-xl font-bold text-xs uppercase tracking-widest active:scale-95 transition shadow-lg">Registrar Tarea</button>
      </div>
    </main>
  </div>

  <div id="m-profile" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="glass w-full max-w-sm p-6 bg-white space-y-5 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between font-bold items-center text-xl">Mi Perfil <button onclick="closeModal('m-profile')"><i data-lucide="x"></i></button></div>
        
        <button id="btn-google" class="w-full flex items-center justify-center gap-3 border-2 border-gray-300 p-3 rounded-2xl font-bold bg-white hover:bg-gray-50 transition">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5"> Vincular con Google
        </button>

        <div class="border-t pt-4">
            <p class="text-[10px] font-bold uppercase text-blue-600 mb-2">Administrar Servidor</p>
            <input type="text" id="s-name" placeholder="Nombre de tu servidor" class="w-full border-b-2 border-[#3f3b39] mb-3 font-bold outline-none text-sm">
            <button onclick="crearServer()" class="w-full bg-blue-600 text-white py-2 rounded-xl text-xs font-bold shadow-md active:scale-95 transition mb-2">GENERAR CÓDIGO</button>
            <div id="code-box" class="hidden p-3 bg-blue-50 border-2 border-blue-200 rounded-xl text-center mb-3">
                <p class="text-[9px] font-bold text-blue-400">CÓDIGO PARA INVITAR:</p>
                <b id="the-code" class="text-2xl tracking-[0.3em] block my-1 font-mono"></b>
                <button onclick="copiarC()" class="text-[10px] underline font-bold text-blue-700">Copiar y enviar</button>
            </div>
            
            <p class="text-[10px] font-bold uppercase text-gray-400 mb-2 mt-4">¿Te enviaron un código?</p>
            <div class="flex gap-2">
                <input type="text" id="join-code" placeholder="Pega el código aquí" class="flex-1 border-b-2 border-[#3f3b39] font-bold outline-none text-sm uppercase">
                <button onclick="unirseServer()" class="bg-[#3f3b39] text-white px-3 py-1 rounded text-[10px] font-bold">Unirse</button>
            </div>
        </div>

        <div class="border-t pt-4">
            <p class="text-[10px] font-bold uppercase text-gray-400 mb-3">Fondo de Pantalla</p>
            <div class="flex items-center gap-4">
                <input type="color" id="color-p" class="w-10 h-10 rounded-lg cursor-pointer border-2 border-black" onchange="setBgC(this.value)">
                <button onclick="document.getElementById('img-u').click()" class="flex-1 py-2 border-2 border-[#3f3b39] rounded-xl text-[10px] font-bold hover:bg-gray-100 transition">SUBIR FOTO</button>
                <input type="file" id="img-u" accept="image/*" class="hidden" onchange="setBgI(event)">
            </div>
        </div>

        <div class="border-t pt-4">
            <button onclick="silenciarNotifs()" id="btn-silence" class="w-full py-2 bg-red-50 text-red-600 border border-red-200 rounded-lg text-[10px] font-bold uppercase">
                Silenciar Notificaciones (1 Mes)
            </button>
            <p id="silence-status" class="text-[9px] text-center mt-1 text-gray-500"></p>
        </div>
    </div>
  </div>

  <div id="m-store" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-4">
    <div class="glass w-full max-w-sm p-6 bg-white max-h-[70vh] flex flex-col">
        <div class="flex justify-between font-bold text-xl mb-5">Tienda 🐾 <button onclick="closeModal('m-store')"><i data-lucide="x"></i></button></div>
        <div id="store-items" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // CONEXIÓN A FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyDPTKgbttL8DbukqHhB8vE-5hEVE6A2v8M",
      authDomain: "nexotasks.firebaseapp.com",
      databaseURL: "https://nexotasks-default-rtdb.firebaseio.com",
      projectId: "nexotasks",
      storageBucket: "nexotasks.firebasestorage.app",
      messagingSenderId: "821277921208",
      appId: "1:821277921208:web:abbc7d0d2855eca671894d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // VARIABLES DE ESTADO LOCAL
    let lunas = parseInt(localStorage.getItem('nx_lunas')) || 0;
    let owned = JSON.parse(localStorage.getItem('nx_owned')) || [];
    let curCat = 'hogar';
    let tasks = JSON.parse(localStorage.getItem('nx_tasks')) || [];
    let bgConfig = JSON.parse(localStorage.getItem('nx_bg')) || { type: 'color', val: '#fdf6e3' };
    let activeServer = localStorage.getItem('nx_server_code') || null;

    const pets = [
        {id:'p1', n:'Gato', e:'🐱', c:10}, {id:'p2', n:'Perro', e:'🐶', c:20},
        {id:'p3', n:'Zorro', e:'🦊', c:30}, {id:'p4', n:'Lobo', e:'🐺', c:40},
        {id:'p5', n:'Águila', e:'🦅', c:50}, {id:'p6', n:'Gusano', e:'🐛', c:60},
        {id:'p7', n:'Unicornio', e:'🦄', c:70}, {id:'p8', n:'Dragón', e:'🐉', c:80},
        {id:'p9', n:'Conejo', e:'🐰', c:90}
    ];

    window.onload = () => { 
        lucide.createIcons(); 
        uLunas(); 
        applyBg();
        verificarSilencio();
        setCat('hogar');
        if(localStorage.getItem('nx_active')) spawn(localStorage.getItem('nx_active'));
        
        // Escuchar tareas del servidor si estamos unidos a uno
        if(activeServer) escucharServidor();
    };

    // --- GOOGLE SIGN-IN ---
    document.getElementById('btn-google').onclick = () => {
        signInWithPopup(auth, provider).then((res) => {
            alert("¡Conectado! Hola " + res.user.displayName);
        }).catch(err => alert("Error: " + err.message));
    };

    // --- LÓGICA DE SERVIDOR COMPARTIDO ---
    window.crearServer = () => {
        const cod = Math.random().toString(36).substring(2, 7).toUpperCase();
        const nom = document.getElementById('s-name').value || "Servidor Pro";
        
        set(ref(db, 'servidores/' + cod), { admin: nom, creado: Date.now() });
        
        activeServer = cod;
        localStorage.setItem('nx_server_code', cod);
        escucharServidor();
        
        document.getElementById('the-code').innerText = cod;
        document.getElementById('code-box').classList.remove('hidden');
        document.getElementById('c-servidor').title = nom;
    };

    window.unirseServer = () => {
        const cod = document.getElementById('join-code').value.trim().toUpperCase();
        if(cod.length === 5) {
            activeServer = cod;
            localStorage.setItem('nx_server_code', cod);
            escucharServidor();
            alert("¡Te has unido al servidor " + cod + "!");
            closeModal('m-profile');
            setCat('servidor');
        } else {
            alert("El código debe tener 5 caracteres.");
        }
    };

    window.copiarC = () => {
        navigator.clipboard.writeText(document.getElementById('the-code').innerText);
        alert("¡Código copiado para enviar!");
    };

    function escucharServidor() {
        if(!activeServer) return;
        const serverRef = ref(db, 'servidores/' + activeServer + '/tareas');
        onValue(serverRef, (snapshot) => {
            const data = snapshot.val();
            // Filtrar las tareas locales que NO son del servidor
            tasks = tasks.filter(t => t.cat !== 'servidor');
            
            if(data) {
                // Añadir las tareas de la nube a la lista local
                Object.keys(data).forEach(key => {
                    if(data[key].s === 'p') {
                        tasks.push({ ...data[key], id: key });
                    }
                });
            }
            if(curCat === 'servidor') renderT();
        });
    }

    // --- GESTIÓN DE TAREAS ---
    window.setCat = (c) => {
        curCat = c;
        document.querySelectorAll('.side-icon').forEach(b => b.classList.remove('active'));
        document.getElementById('c-'+c).classList.add('active');
        document.getElementById('t-cat').value = c;
        renderT();
    };

    window.saveTask = () => {
        const txt = document.getElementById('t-text').value;
        const dat = document.getElementById('t-date').value;
        if(!txt || !dat) return alert("Escribe la tarea y la fecha");
        
        const newTask = { txt, dat:new Date(dat).getTime(), cat:curCat, s:'p' };

        if(curCat === 'servidor' && activeServer) {
            // Guardar en la nube para todos
            push(ref(db, 'servidores/' + activeServer + '/tareas'), newTask);
        } else {
            // Guardar local
            newTask.id = Date.now();
            tasks.push(newTask);
            localStorage.setItem('nx_tasks', JSON.stringify(tasks));
            renderT();
        }
        document.getElementById('t-text').value = '';
    };

    window.done = (id) => {
        const i = tasks.findIndex(t => t.id === id);
        if(i > -1) {
            let rew = 10;
            // Bono por rapidez (antes de 7 días)
            const diffMs = tasks[i].dat - Date.now();
            if(diffMs > 0 && diffMs <= 604800000) rew += 25;
            
            lunas += rew;
            localStorage.setItem('nx_lunas', lunas);
            uLunas();
            
            if(tasks[i].cat === 'servidor' && activeServer) {
                // Actualizar estado en la nube a finalizado
                set(ref(db, 'servidores/' + activeServer + '/tareas/' + id + '/s'), 'f');
            } else {
                tasks[i].s = 'f';
                localStorage.setItem('nx_tasks', JSON.stringify(tasks));
                renderT();
            }
        }
    };

    function renderT() {
        const list = document.getElementById('task-list');
        list.innerHTML = '';
        tasks.filter(t => t.cat === curCat && t.s === 'p').forEach(t => {
            const d = document.createElement('div');
            d.className = "glass p-4 bg-white/95 flex justify-between items-center";
            d.innerHTML = `<div><div class="font-bold text-[#3f3b39]">${t.txt}</div>
                           <div class="text-[10px] font-bold opacity-50 tracking-tighter">${new Date(t.dat).toLocaleString()}</div></div>
                           <button onclick="done(${typeof t.id === 'string' ? `'${t.id}'` : t.id})" class="p-2 border-2 border-green-500 rounded-lg text-green-600 active:bg-green-500 active:text-white transition-all">
                           <i data-lucide="check"></i></button>`;
            list.appendChild(d);
        });
        lucide.createIcons();
    }

    // --- TIENDA, MASCOTAS Y LUNAS ---
    window.openStore = () => {
        const s = document.getElementById('store-items');
        s.innerHTML = '';
        pets.forEach(p => {
            const has = owned.includes(p.id);
            s.innerHTML += `<div class="flex justify-between items-center border-b border-gray-100 pb-3">
                <div class="flex gap-4 items-center"><span class="text-4xl">${p.e}</span><b class="text-sm">${p.n}</b></div>
                <button onclick="${has ? `equip('${p.e}')` : `buy('${p.id}',${p.c})`}" 
                class="px-5 py-2 rounded-full font-bold text-[10px] uppercase tracking-widest transition-all ${has ? 'bg-blue-50 text-blue-600 border border-blue-200' : 'bg-[#3f3b39] text-white shadow-md active:scale-90'}">
                ${has ? 'Equipar' : p.c + ' Lunas'}</button>
            </div>`;
        });
        document.getElementById('m-store').classList.remove('hidden');
    };

    window.buy = (id, c) => {
        if(lunas >= c) {
            lunas -= c; owned.push(id);
            localStorage.setItem('nx_lunas', lunas);
            localStorage.setItem('nx_owned', JSON.stringify(owned));
            uLunas(); openStore();
        } else alert("Te faltan " + (c - lunas) + " lunas 🌕");
    };

    window.equip = (e) => { 
        localStorage.setItem('nx_active', e); spawn(e); closeModal('m-store'); 
    };

    function spawn(e) { 
        const p = document.getElementById('active-pet'); 
        p.innerText = e; p.classList.remove('hidden'); 
    }

    function uLunas() { document.getElementById('luna-counter').innerText = lunas; }

    // --- PERSONALIZACIÓN Y SILENCIO ---
    window.setBgC = (c) => { 
        bgConfig = { type: 'color', val: c };
        guardarYAplicarBg();
    };

    window.setBgI = (e) => {
        const r = new FileReader();
        r.onload = (ev) => {
            bgConfig = { type: 'image', val: ev.target.result };
            guardarYAplicarBg();
        };
        r.readAsDataURL(e.target.files[0]);
    };

    function guardarYAplicarBg() {
        localStorage.setItem('nx_bg', JSON.stringify(bgConfig));
        applyBg();
    }

    function applyBg() {
        if (bgConfig.type === 'color') {
            document.body.style.backgroundImage = 'none';
            document.body.style.backgroundColor = bgConfig.val;
        } else {
            document.body.style.backgroundImage = `url(${bgConfig.val})`;
            document.body.style.backgroundSize = 'cover';
        }
    }

    window.silenciarNotifs = () => {
        const now = Date.now();
        localStorage.setItem('nx_mute', now);
        verificarSilencio();
        alert("Notificaciones silenciadas por 30 días.");
    };

    function verificarSilencio() {
        const m = localStorage.getItem('nx_mute');
        if(!m) return;
        const passed = Date.now() - parseInt(m);
        const thirtyDays = 30 * 24 * 60 * 60 * 1000;
        const btn = document.getElementById('btn-silence');
        const status = document.getElementById('silence-status');

        if (passed >= thirtyDays) {
            localStorage.removeItem('nx_mute');
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
            status.innerText = "";
        } else {
            const daysLeft = Math.ceil((thirtyDays - passed) / (1000 * 60 * 60 * 24));
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            status.innerText = `Silenciadas. Faltan ${daysLeft} días.`;
        }
    }

    // --- INTERFAZ ---
    window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
    window.openProfile = () => document.getElementById('m-profile').classList.remove('hidden');
  </script>
</body>
</html>
